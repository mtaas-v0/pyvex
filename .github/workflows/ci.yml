name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  ecosystem:
    if: false
    uses: angr/ci-settings/.github/workflows/angr-ci.yml@master

  build-windows-arm64:
    # Native GitHub-hosted Windows ARM64 runner label
    name: Build PyVEX for Python ${{ matrix.python-version }} on Windows ARM64
    runs-on: windows-11-arm
    strategy:
      # Keep true failures isolated so experimental builds don't block stable ones
      fail-fast: false
      matrix:
        python-version:
          - "3.12"         # Stable baseline
          - "3.13"         # Standard Python 3.13
          - "3.13t"        # 3.13 Free-Threaded (experimental GIL-disabled)
          - "3.14"         # Standard Python 3.14 (GIL enabled)
          - "3.14t"        # 3.14 Free-Threaded (fully integrated GIL-disabled)
          - "3.15"     # Alpha nightly standard 
          - "3.15t"    # Alpha nightly Free-Threaded
    env:
      # Explicitly force uv to target the Windows arm64 Python architecture
      UV_PYTHON_PREFERENCE: only-managed
      UV_PYTHON: arm64

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Options: true (one level), recursive (all levels), or false (default)
        submodules: recursive
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Ensure Native Windows ARM64 Python
      # Installs the precise native arm64 interpreter required for compiling
      run: uv python install "${{ matrix.python-version }}" --preview
      # cannot accept --arch arm64

    - name: Setup MSVC Compiler Dev Cmd (Compiled Extensions Only)
      # Only uncomment this step if your project contains C/C++ extensions
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: arm64
        
    - name: Run Build and Multi-Thread Architecture Checks
      # Pass the matrix variable directly into uv's context loop 
      run: |
        python -c "import sys; print('GIL status (False = Free-Threaded):', sys._is_gil_enabled())"
        uv build

    - name: Run tests
      run: uv run pytest tests
        
    - name: Upload Dynamic Matrix Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PyVEX-unofficial-${{ matrix.python-version }}
        path: dist/
        if-no-files-found: error
        
  test:
    name: Test
    if: false
    strategy:
      matrix:
        os: 
          - macos-15-intel
          - macos-15
          - ubuntu-24.04
#          - windows-11-arm
          - windows-2022
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: 'recursive'
      - name: Activate msvc
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        if: startsWith(runner.os, 'windows')
      - name: Setup uv
        uses: astral-sh/setup-uv@445689ea25e0de0a23313031f5fe577c74ae45a1 # v6
      - name: Sync dependencies
        run: uv sync -p 3.14
      - name: Run tests
        run: uv run pytest tests

      - name: Build wheel and source distribution
        run: uv build
  
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/
          if-no-files-found: error
